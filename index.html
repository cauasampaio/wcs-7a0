<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Copa do Mundo - 7-0 Style</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
</head>
<body>
    <header>
        <div class="logo">
            <h1>7-0</h1>
            <div class="logo-subtitle">DEFINIR PARA ZERO<br>ARMA · SIMULA · 7 A 0</div>
        </div>
        <div class="header-info">
            <span id="current-formation-display">4-3-3 · EQUILIBRADO · CLÁSSICO</span>
            <span>FLUXO</span>
            <span>É ▼</span>
            <span>CLARO</span>
        </div>
    </header>

    <main>
        <section id="left-panel" class="panel">
            <div class="card">
                <h3>TREINAMENTO</h3>
                <div class="formation-grid">
                    <button class="formation-btn active" data-formation="4-3-3">4-3-3</button>
                    <button class="formation-btn" data-formation="4-4-2">4-4-2</button>
                    <button class="formation-btn" data-formation="4-2-3-1">4-2-3-1</button>
                    <button class="formation-btn" data-formation="4-2-4">4-2-4</button>
                    <button class="formation-btn" data-formation="3-5-2">3-5-2</button>
                    <button class="formation-btn" data-formation="5-3-2">5-3-2</button>
                </div>
                <h3 style="margin-top:15px">ESTILO</h3>
                <div class="formation-grid">
                    <button class="formation-btn">Defensiva</button>
                    <button class="formation-btn active">Equilibrado</button>
                    <button class="formation-btn">Ofensiva</button>
                </div>
                <h3 style="margin-top:15px">MODO · DIFICULDADE</h3>
                <div class="formation-grid">
                    <button class="formation-btn active">Clássico</button>
                    <button class="formation-btn">De memória</button>
                </div>
            </div>

            <div class="card" style="display:flex; flex-direction:column">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                    <h3 id="team-name" style="margin:0">SELEÇÃO</h3>
                    <button id="random-team-btn" class="btn" style="padding: 5px 10px; font-size: 10px;">RANDOMIZAR 🎲</button>
                </div>
                <div id="players-list" class="players-scroll">
                    <!-- JS -->
                </div>
            </div>
        </section>

        <section id="center-panel" class="panel">
            <div class="field-lines"></div>
            <div class="center-circle"></div>
            <div id="tactical-spots">
                <!-- JS -->
            </div>
        </section>

        <section id="right-panel" class="panel">
            <div class="card" style="height: 100%">
                <div class="summary-header">
                    <span>SUMÁRIO DO JOGO</span>
                    <span id="squad-count">0 / 11</span>
                </div>
                <div class="progress-bar"><div id="progress-fill"></div></div>
                
                <div id="positions-list">
                    <!-- JS -->
                </div>
            </div>
        </section>
    </main>

    <footer style="display: flex; flex-direction: column; align-items: center; width: 450px; margin: 0 auto; padding: 10px 0; gap: 5px; flex-shrink: 0;">
        <button class="btn-primary" id="start-tournament-btn" disabled style="padding: 10px 40px; font-size: 18px;">ARREMESSO 🎲</button>
        <div style="display:flex; gap:10px; width: 100%;">
            <button class="btn" id="skip-team-btn" style="flex:1; padding: 8px;">PULAR</button>
            <button class="btn" id="clear-btn" style="flex:1; padding: 8px;">LIMPAR</button>
        </div>
        <div style="font-size: 9px; margin-top: 5px; opacity: 0.5; text-align: center;">
            7A0 - DEFINIR PARA ZERO · ARMA · SIMULA · 7 A 0 · PRIVACIDADE
        </div>
    </footer>

    <div id="tournament-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="tournament-results"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
